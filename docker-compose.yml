services:
  mitre-detector:
    build:
      context: .
      args:
        - BUILD_TYPE=cpu
    container_name: mitre-detector
    ports:
      - "8080:8080"
    volumes:
      # Montaje de los modelos y datos en modo solo lectura (ro)
      - ./models:/models:ro
      - ./data:/data:ro
    environment:
      # Variables de entorno para src/api.py
      - MODEL_PATH=/models
      - DATA_PATH=/data
    restart: unless-stopped
    
    # ==========================================================
    # SOPORTE PARA GPU (NVIDIA CUDA) - OPCIONAL
    # ==========================================================
    # Si el servidor o equipo host tiene una GPU NVIDIA y el 
    # nvidia-container-toolkit instalado, descomenta las líneas 

    # de abajo para activar la aceleración por hardware.
    # También deberás modificar BUILD_TYPE a 'gpu' en el bloque de build para usar una imagen base compatible con CUDA.

    # Si se dejan comentadas, PyTorch operará en modo CPU de 
    # forma automática, independientemente del valor de BUILD_TYPE.
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]